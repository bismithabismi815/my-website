document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

grR2YnoCpI0McNp6dDwK3P/gnxYvAzfwb2aCIAAA\" fit=\"cover\" placeholder=\"Drop a hero image — classroom or students\" shape=\"rounded\" radius=\"20\" style=\"display:block; width:100%; height:clamp(260px,44vw,460px); border:1px solid rgba(201,168,76,0.3); border-radius:20px; box-shadow:0 24px 60px rgba(0,0,0,0.28);\"><\u002Fimage-slot><\u002Fsection>\n\n    <div style=\"max-width: 1200px; margin: 0 auto; padding: 0 32px;\"><div style=\"height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.45), transparent);\"><\u002Fdiv><\u002Fdiv>\n\n    <!-- ABOUT SNAPSHOT -->\n    <section style=\"max-width: 1200px; margin: 0 auto; padding: 88px 32px; display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 56px; align-items: center;\">\n      <div>\n        <div style=\"font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-ink); margin-bottom: 16px;\">About the Academy<\u002Fdiv>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: clamp(30px, 4vw, 44px); line-height: 1.12; margin: 0 0 20px;\">Where rigour meets personal attention.<\u002Fh2>\n        <p style=\"font-size: 17px; line-height: 1.7; color: var(--t-body); margin: 0 0 16px;\">ALGEBRA is a focused tuition academy built on one belief: every student can excel when taught with clarity, structure and care. We blend experienced faculty with small, attentive batches to turn confusion into confidence.<\u002Fp>\n        <p style=\"font-size: 17px; line-height: 1.7; color: var(--t-body); margin: 0;\">From primary school fundamentals to specialised PSC Mathematics, our programmes are designed to reset habits, refocus effort, and restart academic momentum.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 16px;\">\n        <div style=\"grid-column: 1 / -1; background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 16px; padding: 28px;\">\n          <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 44px; color: var(--gold-ink); line-height: 1;\">1–12<\u002Fdiv>\n          <div style=\"font-size: 14px; color: var(--t-body); margin-top: 8px;\">All grades, all boards welcomed<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 16px; padding: 24px;\">\n          <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 30px; color: var(--gold-ink); line-height: 1;\">All<\u002Fdiv>\n          <div style=\"font-size: 13px; color: var(--t-body); margin-top: 6px;\">Subjects covered<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background: var(--card); border: 1px solid rgba(201,168,76,0.3); border-radius: 16px; padding: 24px;\">\n          <div style=\"font-family: 'Cormorant Garamond', serif; font-weight: 700; font-size: 30px; color: var(--gold-ink); line-height: 1;\">PSC<\u002Fdiv>\n          <div style=\"font-size: 13px; color: var(--t-body); margin-top: 6px;\">Special classes<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- WHY CHOOSE US -->\n    <section style=\"max-width: 1200px; margin: 0 auto; padding: 40px 32px 88px;\">\n      <div style=\"text-align: center; margin-bottom: 48px;\">\n        <div style=\"font-size: 13px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold-ink); margin-bottom: 14px;\">Why Choose Us<\u002Fdiv>\n        <h2 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: clamp(30px, 4vw, 44px); margin: 0;\">A learning experience built to last.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px;\">\n        <div style=\"background: var(--card); border: 1px solid rgba(201,168,76,0.2); border-radius: 18px; padding: 30px 26px; transition: transform .2s, border-color .2s;\" style-hover=\"transform: translateY(-6px); border-color: rgba(201,168,76,0.6);\">\n          <div style=\"width: 52px; height: 52px; border-radius: 12px; border: 1px solid rgba(201,168,76,0.4); display: flex; align-items: center; justify-content: center; margin-bottom: 20px;\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" style=\"stroke:var(--gold-ink)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M22 10v6M2 10l10-5 10 5-10 5z\"><\u002Fpath><path d=\"M6 12v5c3 3 9 3 12 0v-5\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 22px; margin: 0 0 10px;\">Expert Faculty<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.6; color: var(--t-body); margin: 0;\">Seasoned teachers who make complex topics genuinely click.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background: var(--card); border: 1px solid rgba(201,168,76,0.2); border-radius: 18px; padding: 30px 26px; transition: transform .2s, border-color .2s;\" style-hover=\"transform: translateY(-6px); border-color: rgba(201,168,76,0.6);\">\n          <div style=\"width: 52px; height: 52px; border-radius: 12px; border: 1px solid rgba(201,168,76,0.4); display: flex; align-items: center; justify-content: center; margin-bottom: 20px;\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" style=\"stroke:var(--gold-ink)\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M4 21c0-4 4-6 8-6s8 2 8 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h3 style=\"font-family: 'Cormorant Garamond', serif; font-weight: 600; font-size: 22px; margin: 0 0 10px;\">Personalized Attention<\u002Fh3>\n          <p style=\"font-size: 14.5px; line-height: 1.6; color: var(--t-body); margin: 0;\">Small batches mean every student is seen, heard and guided.<\u002F ss Component extends DCLogic {\n  state = {\n    page: 'home',\n    theme: 'dark',\n    menuOpen: false,\n    openLevel: 'primary',\n    submitted: false,\n    fName: '', fGrade: '', fSubject: '', fPhone: '', fMessage: ''\n  };\n\n  go(page) {\n    this.setState({ page, menuOpen: false, submitted: false });\n    try { window.scrollTo({ top: 0, behavior: 'auto' }); } catch (e) {}\n  }\n\n  renderVals() {\n    const page = this.state.page;\n    const inactiveNav = this.state.theme === 'light' ? 'rgba(46,24,64,0.82)' : 'rgba(245,240,232,0.82)';\n    const navColor = (p) => p === page ? '#C9A84C' : inactiveNav;\n\n    const levelData = [\n      { key: 'primary', title: 'Primary', grades: 'Grades 1–5', subjects: ['Mathematics', 'English', 'Science', 'Environmental Studies', 'Malayalam', 'Hindi'] },\n      { key: 'middle', title: 'Middle', grades: 'Grades 6–8', subjects: ['Mathematics', 'Science', 'Social Studies', 'English', 'Malayalam', 'Hindi', 'IT'] },\n      { key: 'high', title: 'High', grades: 'Grades 9–10', subjects: ['Mathematics', 'Physics', 'Chemistry', 'Biology', 'Social Science', 'English'] },\n      { key: 'higher', title: 'Higher Secondary', grades: 'Grades 11–12', subjects: ['Mathematics', 'Physics', 'Chemistry', 'Biology', 'Commerce', 'Accountancy', 'Economics'] }\n    ];\n    const levels = levelData.map(l => ({\n      title: l.title,\n      grades: l.grades,\n      subjects: l.subjects,\n      open: this.state.openLevel === l.key,\n      iconRotate: this.state.openLevel === l.key ? 'rotate(45deg)' : 'rotate(0deg)',\n      onToggle: () => this.setState(s => ({ openLevel: s.openLevel === l.key ? null : l.key }))\n    }));\n\n    const subjects = [\n      { name: 'Mathematics', glyph: '∑' },\n      { name: 'Science', glyph: '⚛' },\n      { name: 'English', glyph: 'A' },\n      { name: 'Social Studies', glyph: '◷' },\n      { name: 'Physics', glyph: 'φ' },\n      { name: 'Chemistry', glyph: '⚗' },\n      { name: 'Commerce', glyph: '₹' },\n      { name: 'Biology', glyph: '✚' }\n    ];\n\n    const setField = (k) => (e) => this.setState({ [k]: e.target.value });\n\n    return {\n      theme: this.state.theme,\n      isDark: this.state.theme === 'dark',\n      isLight: this.state.theme === 'light',\n      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'dark' ? 'light' : 'dark' })),\n      pageKey: page,\n      isHome: page === 'home',\n      isServices: page === 'services',\n      isContact: page === 'contact',\n      homeNavColor: navColor('home'),\n      servicesNavColor: navColor('services'),\n      contactNavColor: navColor('contact'),\n      menuOpen: this.state.menuOpen,\n      toggleMenu: () => this.setState(s => ({ menuOpen: !s.menuOpen })),\n      goHome: () => this.go('home'),\n      goServices: () => this.go('services'),\n      goContact: () => this.go('contact'),\n      levels,\n      subjects,\n      submitted: this.state.submitted,\n      fName: this.state.fName,\n      fGrade: this.state.fGrade,\n      fSubject: this.state.fSubject,\n      fPhone: this.state.fPhone,\n      fMessage: this.state.fMessage,\n      onName: setField('fName'),\n      onGrade: setField('fGrade'),\n      onSubject: setField('fSubject'),\n      onPhone: setField('fPhone'),\n      onMessage: setField('fMessage'),\n      onSubmit: () => this.setState({ submitted: true })\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
